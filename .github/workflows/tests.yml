name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo with submodules
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install test framework dependencies
      run: |
        pip install -r requirements.txt

    - name: Install API dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r sut/FastAPIMockApp/requirements.txt

    - name: Fix missing pytest deps
      run: |
        pip install pygments

    - name: Install Playwright Browsers
      run: |
        playwright install --with-deps

    - name: Start FastAPI App
      run: |
        cd sut/FastAPIMockApp
        nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8080 > server.log 2>&1 &
        sleep 5
        cat server.log

    - name: Wait for API (robus)
      run: |
        for i in {1..10}; do
          curl http://127.0.0.1:8080/health && break
          echo "Waiting for API..."
          sleep 2
        done

    - name: Verify API is running
      run: |
        curl -f http://127.0.0.1:8080/docs

    - name: Debug API
      run: |
        curl -X POST http://127.0.0.1:8080/api/login \
          -H "Content-Type: application/json" \
          -d '{"username":"admin", "password":"password"}'

    - name: Show FastAPI main.py
      run: |
        echo "========== main.py ============="
        sed -n '1,200p' sut/FastAPIMockApp/app/main.py

    - name: Show FastAPI auth.py
      run: |
        echo "========== auth.py ============="
        sed -n '1,200p' sut/FastAPIMockApp/app/api/auth.py

    - name: Show OpenAPI routes
      run: |
        curl http://127.0.0.1:8080/openapi.json
        

    - name: Run Tests with Report
      run: |
        python -m pytest -v --env=dev --html=report.html --self-contained-html

    - name: Debug Routes
      run: |
        curl http://127.0.0.1:8080/openapi.json | grep login

    - name: Print server logs
      if: always()
      run: |
        cat server.log || echo "No server.log found"

    - name: Upload Test Report
      uses: actions/upload-artifact@v4
      with:
        name: pytest-report
        path: report.html