name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo with submodules
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r sut/FastAPIMockApp/requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install --with-deps

      - name: Start FastAPI app
        run: |
          cd sut/FastAPIMockApp
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8080 > server.log 2>&1 &
          echo $! > uvicorn.pid

      - name: Wait for API readiness
        run: |
          python - <<'PY'
          import time
          import urllib.request
          import sys

          urls = [
              "http://127.0.0.1:8080/health",
              "http://127.0.0.1:8080/docs"
          ]

          timeout_seconds = 60
          interval_seconds = 2
          deadline = time.time() + timeout_seconds

          while time.time() < deadline:
              for url in urls:
                  try:
                      with urllib.request.urlopen(url) as response:
                          if response.status == 200:
                              print(f"Service is ready via {url}")
                              sys.exit(0)
                  except Exception:
                      pass
              print("Waiting for API...")
              time.sleep(interval_seconds)

          raise SystemExit("FastAPI service failed to become ready within timeout.")
          PY

      - name: Verify API is running
        run: |
          curl -f http://127.0.0.1:8080/docs

      - name: Run tests
        run: |
          mkdir -p test-results
          python -m pytest -v --env=dev \
            --junitxml=test-results/junit-results.xml \
            --html=test-results/report.html \
            --self-contained-html

      - name: Print server logs
        if: ${{ always() }}
        run: |
          cat sut/FastAPIMockApp/server.log || echo "No server.log found"

      - name: Upload test artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            test-results/junit-results.xml
            test-results/report.html
            sut/FastAPIMockApp/server.log
          if-no-files-found: 'warn'
          retention-days: 14

      - name: Stop FastAPI app
        if: ${{ always() }}
        run: |
          if [ -f sut/FastAPIMockApp/uvicorn.pid ]; then
            kill $(cat sut/FastAPIMockApp/uvicorn.pid) || true
          fi