name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo with submodules
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Install test framework dependencies
      run: |
        pip install -r requirements

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install API dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r sut/FastAPIMockApp/requirements.txt

    - name: Install Playwright Browsers
      run: |
        playwright install --with-deps

    - name: Start FastAPI App
      run: |
        echo "Starting FastAPI server..."
        cd sut/FastAPIMockApp
        nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8080 > server.log 2>&1 &
        sleep 5
        echo "===== SERVER LOG ====="
        cat server.log

    - name: Verify API is running
      run: |
        curl http://127.0.0.1:8080/docs

    - name: Run Tests with Report
      run: |
        python -m pytest -v --env=dev --html=report.html --self-contained-html

    - name: Upload Test Report
      uses: actions/upload-artifact@v4
      with:
        name: pytest-report
        path: report.html