name: Run Published Container

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: read

env:
  IMAGE_NAME: ghcr.io/joseph-doan/fc-fastapi-sut:latest

jobs:
  run-published-container:
    runs-on: ubuntu-latest

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published container image
        run: |
          docker pull $IMAGE_NAME

      - name: Start FastAPI container
        run: |
          docker run -d \
            --name fc-fastapi-sut \
            -p 8080:8080 \
            $IMAGE_NAME

      - name: Verify container is running
        run: |
          docker ps
          docker logs fc-fastapi-sut

      - name: Wait for FastAPI health endpoint
        run: |
          for i in {1..30}; do
            if curl -f http://127.0.0.1:8080/health; then
              echo "FastAPI container is healthy"
              exit 0
            fi
            echo "Waiting for FastAPI container..."
            sleep 2
          done

          echo "FastAPI container failed health check"
          docker logs fc-fastapi-sut
          exit 1