name: Run Published Container

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: read

env:
  IMAGE_NAME: ghcr.io/joseph-doan/fc-fastapi-sut:latest
  CONTAINER_NAME: fc-fastapi-sut
  HOST_PORT: 8080
  CONTAINER_PORT: 8080
  BASE_URL: http://127.0.0.1:8080

jobs:
  run-published-container:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Notify Pumble - CI started
        continue-on-error: true
        run: |
          curl -X POST "${{ secrets.PUMBLE_CI_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d "{\"text\":\"🚀 CI started | Repo: ${{ github.repository }} | Branch: ${{ github.ref_name }} | Workflow: ${{ github.workflow }} | Commit: ${{ github.sha }}\"}"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published container image
        run: |
          docker pull $IMAGE_NAME

      - name: Start FastAPI container
        run: |
          docker run -d \
            --name $CONTAINER_NAME \
            -p $HOST_PORT:$CONTAINER_PORT \
            $IMAGE_NAME

      - name: Verify container is running
        run: |
          docker ps
          docker logs $CONTAINER_NAME

      - name: Wait for FastAPI health endpoint
        run: |
          for i in {1..30}; do
            if curl -f $BASE_URL/health; then
              echo "FastAPI container is healthy"
              exit 0
            fi
            echo "Waiting for FastAPI container..."
            sleep 2
          done

          echo "FastAPI container failed health check"
          docker logs $CONTAINER_NAME
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Create test results directory
        run: mkdir -p test-results

      - name: Execute smoke tests against running container
        run: |
          pytest -m smoke \
            --base-url=$BASE_URL \
            --junitxml=test-results/smoke-junit-results.xml \
            --html=test-results/smoke-report.html \
            --self-contained-html

      - name: Capture container logs on test failure
        if: failure()
        run: |
          mkdir -p test-results/logs
          docker ps -a > test-results/logs/docker-ps.txt
          docker logs $CONTAINER_NAME > test-results/logs/fastapi-container.log 2>&1

      - name: Upload smoke test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: test-results/

      - name: Stop and clean up FastAPI container
        if: always()
        run: |
          echo "Cleaning up FastAPI container..."
          docker stop $CONTAINER_NAME || true
          docker rm $CONTAINER_NAME || true
          docker ps -a

      - name: Notify Pumble - CI finished
        if: always()
        continue-on-error: true
        run: |
          STATUS="${{ job.status }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -X POST "${{ secrets.PUMBLE_CI_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"🏁 CI finished | Result: ${STATUS} | Repo: ${{ github.repository }} | Branch: ${{ github.ref_name }} | Run: ${RUN_URL}\"}"