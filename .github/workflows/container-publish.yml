name: Build Test Publish Container

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: joseph-doan/fc-fastapi-sut

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set image tags
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "IMAGE_SHA=${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "IMAGE_LATEST=${REGISTRY}/${IMAGE_NAME}:latest" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE_SHA \
            -t $IMAGE_LATEST \
            ./sut/FastAPIMockApp

      - name: Start containerized app
        run: |
          docker run -d \
            --name fc-fastapi-sut \
            -p 8080:8080 \
            $IMAGE_SHA

      - name: Wait for app health
        run: |
          for i in {1..30}; do
            if curl -f http://127.0.0.1:8080/health; then
              echo "App is healthy"
              exit 0
            fi
            echo "Waiting for app..."
            sleep 2
          done

          echo "App failed to become healthy"
          docker logs fc-fastapi-sut
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Run automated tests
        run: |
          pytest api_tests/tests \
            --junitxml=test-results/junit-results.xml \
            --html=test-results/report.html \
            --self-contained-html

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish tested image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push $IMAGE_SHA
          docker push $IMAGE_LATEST

      - name: Show container logs on failure
        if: failure()
        run: |
          docker logs fc-fastapi-sut || true