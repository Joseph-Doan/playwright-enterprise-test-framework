services:
  fastapi:
    build:
      context: ./sut/FastAPIMockApp
      dockerfile: Dockerfile
    image: fastapi-mock-enterprise-app:local
    container_name: fc-fastapi-local
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test-runner
    image: fc-playwright-test-runner:local
    container_name: fc-test-runner-local
    depends_on:
      fastapi:
        condition: service_healthy
    environment:
      BASE_URL: http://fastapi:8080
      TEST_SUITE: smoke
      REPORT_DIR: /reports
    volumes:
      - ./reports:/reports